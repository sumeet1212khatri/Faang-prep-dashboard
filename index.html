        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #13131a;
            --bg-card: #1a1a24;
            --bg-card-hover: #1f1f2e;
            --accent-primary: #ff6b35;
            --accent-secondary: #f7931e;
            --accent-tertiary: #ffd23f;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b8;
            --text-muted: #6b6b85;
            --border-color: #2a2a3a;
            --success: #4ade80;
            --morning: #ff6b35;
            --night: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 3rem 0;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.05) 0%, transparent 50%);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.25rem;
            opacity: 0.95;
            font-weight: 500;
        }

        .progress-section {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .progress-card {
            flex: 1;
            min-width: 200px;
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .progress-card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            border-color: var(--accent-primary);
        }

        .progress-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .progress-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .week-nav {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .week-nav::-webkit-scrollbar {
            height: 4px;
        }

        .week-nav::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 4px;
        }

        .week-nav::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 4px;
        }

        .week-btn {
            padding: 0.75rem 1.5rem;
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: 'Outfit', sans-serif;
        }

        .week-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .week-btn.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-color: var(--accent-primary);
            box-shadow: 0 8px 24px rgba(255, 107, 53, 0.4);
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .day-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .day-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--morning), var(--night));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .day-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent-primary);
            transform: translateY(-4px);
            box-shadow: 0 12px 36px rgba(255, 107, 53, 0.2);
        }

        .day-card:hover::before {
            opacity: 1;
        }

        .day-card.today {
            border-color: var(--accent-primary);
            background: linear-gradient(135deg, var(--bg-card), var(--bg-card-hover));
            box-shadow: 0 8px 32px rgba(255, 107, 53, 0.3);
        }

        .day-card.today::after {
            content: 'TODAY';
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--accent-primary);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .day-number {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .day-date {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .session {
            margin-bottom: 1rem;
        }

        .session:last-child {
            margin-bottom: 0;
        }

        .session-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .session-icon {
            font-size: 1rem;
        }

        .session-time {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .session-subject {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .session.morning .session-subject {
            color: var(--morning);
        }

        .session.night .session-subject {
            color: var(--night);
        }

        .topics-list {
            margin-top: 0.75rem;
        }

        .topic-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 0.4rem;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .topic-item:hover {
            background: var(--border-color);
            transform: translateX(4px);
        }

        .topic-title {
            flex: 1;
            color: var(--text-primary);
            font-weight: 500;
        }

        .topic-duration {
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            background: var(--bg-card);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            margin-left: 0.5rem;
        }

        .topics-text {
            color: var(--text-secondary);
            font-size: 0.875rem;
            line-height: 1.6;
        }

        .expand-btn {
            margin-top: 0.75rem;
            width: 100%;
            padding: 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Outfit', sans-serif;
        }

        .expand-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .footer {
            text-align: center;
            margin-top: 4rem;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .days-grid {
                grid-template-columns: 1fr;
            }

            .week-nav {
                flex-wrap: nowrap;
            }

            .app-container {
                padding: 1rem;
            }
        }
    </style>

        function App() {
            const [selectedWeek, setSelectedWeek] = useState(0);
            const [expandedDays, setExpandedDays] = useState(new Set());

            const weeks = useMemo(() => {
                const result = [];
                for (let i = 0; i < scheduleData.schedule.length; i += 7) {
                    result.push(scheduleData.schedule.slice(i, i + 7));
                }
                return result;
            }, []);

            const toggleDay = (dayNum) => {
                const newExpanded = new Set(expandedDays);
                if (newExpanded.has(dayNum)) {
                    newExpanded.delete(dayNum);
                } else {
                    newExpanded.add(dayNum);
                }
                setExpandedDays(newExpanded);
            };

            const getTodayDayNumber = () => {
                const today = new Date('2026-04-09'); // Current date
                const startDate = new Date('2026-04-10'); // D1 starts on Apr 10
                const diffTime = today - startDate;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
                return diffDays + 1;
            };

            const todayDay = getTodayDayNumber();
            const totalDays = scheduleData.schedule.length;
            const completedDays = Math.max(0, todayDay - 1);
            const progressPercentage = Math.round((completedDays / totalDays) * 100);

            return (
                <div className="app-container">
                    <div className="header">
                        <div className="header-content">
                            <h1>🚀 60-Day Study Marathon</h1>
                            <div className="subtitle">DSA · OS · LLD · DBMS · CN</div>
                        </div>
                    </div>

                    <div className="progress-section">
                        <div className="progress-card">
                            <div className="progress-label">Total Days</div>
                            <div className="progress-value">{totalDays}</div>
                        </div>
                        <div className="progress-card">
                            <div className="progress-label">Completed</div>
                            <div className="progress-value">{completedDays}</div>
                        </div>
                        <div className="progress-card">
                            <div className="progress-label">Remaining</div>
                            <div className="progress-value">{totalDays - completedDays}</div>
                        </div>
                        <div className="progress-card">
                            <div className="progress-label">Progress</div>
                            <div className="progress-value">{progressPercentage}%</div>
                        </div>
                    </div>

                    <div className="week-nav">
                        {weeks.map((week, idx) => (
                            <button
                                key={idx}
                                className={`week-btn ${selectedWeek === idx ? 'active' : ''}`}
                                onClick={() => setSelectedWeek(idx)}
                            >
                                Week {idx + 1}
                            </button>
                        ))}
                    </div>

                    <div className="days-grid">
                        {weeks[selectedWeek]?.map((day, idx) => {
                            const dayNum = parseInt(day.day.substring(1));
                            const isToday = dayNum === todayDay;
                            const isExpanded = expandedDays.has(dayNum);

                            return (
                                <div
                                    key={dayNum}
                                    className={`day-card ${isToday ? 'today' : ''}`}
                                    onClick={() => toggleDay(dayNum)}
                                >
                                    <div className="day-header">
                                        <div className="day-number">{day.day}</div>
                                        <div className="day-date">{day.date}</div>
                                    </div>

                                    <div className="session morning">
                                        <div className="session-header">
                                            <span className="session-icon">☀️</span>
                                            <span className="session-time">{day.morning.time}</span>
                                        </div>
                                        <div className="session-subject">{day.morning.subject}</div>
                                        {isExpanded && Array.isArray(day.morning.topics) && (
                                            <div className="topics-list">
                                                {day.morning.topics.map((topic, i) => (
                                                    <div key={i} className="topic-item">
                                                        <span className="topic-title">{topic.title}</span>
                                                        <span className="topic-duration">{topic.duration}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        {!isExpanded && Array.isArray(day.morning.topics) && (
                                            <div className="topics-text">
                                                {day.morning.topics.length} topics
                                            </div>
                                        )}
                                        {typeof day.morning.topics === 'string' && (
                                            <div className="topics-text">{day.morning.topics}</div>
                                        )}
                                    </div>

                                    <div className="session night">
                                        <div className="session-header">
                                            <span className="session-icon">🌙</span>
                                            <span className="session-time">{day.night.time}</span>
                                        </div>
                                        <div className="session-subject">{day.night.subject}</div>
                                        <div className="topics-text">{day.night.topics}</div>
                                    </div>

                                    {Array.isArray(day.morning.topics) && day.morning.topics.length > 0 && (
                                        <button className="expand-btn" onClick={(e) => { e.stopPropagation(); toggleDay(dayNum); }}>
                                            {isExpanded ? '▲ Show Less' : '▼ Show All Topics'}
                                        </button>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    <div className="footer">
                        💪 Stay consistent. You got this! 🎯
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
