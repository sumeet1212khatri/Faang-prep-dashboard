        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 3rem;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin: 0;
        }

        .week-section {
            margin-bottom: 4rem;
        }

        .week-header {
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: baseline;
            gap: 1rem;
        }

        .week-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
            letter-spacing: -0.01em;
        }

        .week-header span {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .day-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 1.5rem;
            transition: border-color 0.2s ease, transform 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .day-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .day-number {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent);
            background: #1a1a1a;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #333;
        }

        .day-date {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-variant-numeric: tabular-nums;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #71717a;
            font-weight: 600;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        li {
            font-size: 0.9rem;
            color: #d4d4d8;
            line-height: 1.4;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        li::before {
            content: '—';
            color: #555;
        }

        .problem-link {
            color: var(--text-primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .problem-link:hover {
            opacity: 0.7;
        }

        .difficulty {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .diff-easy { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .diff-medium { background: rgba(234, 179, 8, 0.1); color: #facc15; border: 1px solid rgba(234, 179, 8, 0.2); }
        .diff-hard { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }

        .notes-section {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px dashed var(--border-subtle);
            font-size: 0.8rem;
            color: #888;
            font-style: italic;
        }
    </style>
</head>

        scheduleData.forEach(weekData => {
            // Create Week Header
            const weekSection = document.createElement('div');
            weekSection.className = 'week-section';

            const weekHeader = document.createElement('div');
            weekHeader.className = 'week-header';
            weekHeader.innerHTML = `
                <h2>Week ${weekData.week}</h2>
                <span>${weekData.week_type}</span>
            `;
            weekSection.appendChild(weekHeader);

            // Create Grid for Days in this Week
            const gridContainer = document.createElement('div');
            gridContainer.className = 'grid-container';

            weekData.days.forEach(dayInfo => {
                const lecturesHTML = dayInfo.dsa_lectures.map(lec => `<li>${lec}</li>`).join('');
                
                const questionsHTML = dayInfo.questions.map(q => `
                    <li>
                        <a href="${q.link}" target="_blank" class="problem-link">
                            ${q.problem} 
                            <span class="difficulty diff-${q.difficulty.toLowerCase()}">${q.difficulty}</span>
                        </a>
                    </li>
                `).join('');

                const notesHTML = dayInfo.notes ? `<div class="notes-section">${dayInfo.notes}</div>` : '';

                const card = document.createElement('div');
                card.className = 'day-card';
                card.innerHTML = `
                    <div class="day-header">
                        <span class="day-number">Day ${dayInfo.day}</span>
                        <span class="day-date">${dayInfo.date}</span>
                    </div>
                    
                    <div class="section">
                        <div class="section-title">Lectures</div>
                        <ul>${lecturesHTML}</ul>
                    </div>

                    <div class="section">
                        <div class="section-title">Core Subject</div>
                        <ul><li>${dayInfo.other_subject}</li></ul>
                    </div>

                    <div class="section">
                        <div class="section-title">Problems</div>
                        <ul>${questionsHTML}</ul>
                    </div>
                    
                    ${notesHTML}
                `;
                
                gridContainer.appendChild(card);
            });

            weekSection.appendChild(gridContainer);
            timelineContainer.appendChild(weekSection);
        });
